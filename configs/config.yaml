# ShopTalk — single source of truth for paths, model names, and tunables.
# Every module reads from here (via src.common.config) — never hardcode a path or model name elsewhere.

paths:
  data_dir: "data"
  raw_dir: "data/raw"                                    # contains listings/ and images/ (extracted from ABO archives)
  raw_listings: "data/raw/listings/metadata"             # listings_*.json.gz shards
  images_csv: "data/raw/images/metadata/images.csv"      # image_id -> path join table (~398K rows, ~6MB; NOT the 3GB image archive)
  products_parquet: "data/processed/products.parquet"
  products_enriched_parquet: "data/processed/products_enriched.parquet"
  golden_set: "data/eval/golden_set.json"
  chroma_dir: "data/chroma"
  weights_dir: "weights"

dataset:
  language_filter: "en"
  subsample_size: 40000
  subsample_strategy: "stratified_by_product_type"
  random_seed: 42

captioning:
  # Local-dev sample size for MPS iteration (per docs/ShopTalk_Plan.md §8 — "dev on a
  # ~200-img local MPS sample"). The full ~40K-product run is expected to execute on a
  # free Kaggle/Colab GPU; its output (`products_enriched.parquet`) is pulled back here.
  dev_sample_size: 200
  max_new_tokens: 30
  images_cache_dir: "data/images"

models:
  captioning:
    primary: "Salesforce/blip2-opt-2.7b"
    compare:
      - "Salesforce/blip-image-captioning-base"
  text_encoder:
    primary: "BAAI/bge-base-en-v1.5"
    compare:
      - "sentence-transformers/all-MiniLM-L6-v2"
      - "intfloat/e5-base-v2"
  multimodal_encoder: "openai/clip-vit-base-patch32"
  reranker: "BAAI/bge-reranker-base"
  generator_llm:
    # Groq-hosted (not local Ollama) — a 5-7GB local model competes for the M3's 16GB
    # unified memory alongside FastAPI/Streamlit/Chroma/Whisper (see docs/ShopTalk_Plan.md
    # §8 M3 watch-outs). Groq's free tier is fast + ~$0 at this project's scale, and this
    # swap is orthogonal to the Phase-3 retrieval evals (generator LLM never touches them).
    # Requires GROQ_API_KEY in .env — see .env.example.
    provider: "groq"
    primary: "llama-3.1-8b-instant"   # production-tier, 560 T/s, $0.05/$0.08 per 1M tokens
    compare:
      - "llama-3.3-70b-versatile"     # stronger/larger — A/B for the rerank & generation-quality comparisons
  stt: "faster-whisper-small"
  tts: "piper"

retrieval:
  top_k: 10
  rerank_top_n: 50
  approaches:
    - "text_only"
    - "text_plus_image_caption"
    - "multimodal_clip"

finetune:
  base_model: "BAAI/bge-base-en-v1.5"
  method: "lora"
  loss_primary: "MultipleNegativesRankingLoss"
  loss_alt: "TripletLoss"
  lora:
    r: 16
    alpha: 32
    dropout: 0.1
  epochs: 3
  learning_rate: 2.0e-5
  batch_size: 32

eval:
  metrics_primary:
    - "precision_at_k"
    - "mrr"
  metrics_approximate:
    - "recall_at_k"
    - "ndcg"
  k_values: [1, 3, 5, 10]

agent:
  memory:
    short_term: "in_memory_buffer"
    persistent_backend: "redis"
    redis_url: "redis://localhost:6379/0"

api:
  host: "0.0.0.0"
  port: 8000

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
